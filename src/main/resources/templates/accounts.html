<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Tai khoan</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-4">
	<div class="d-flex justify-content-between mb-3">
		<h3>Tai khoan</h3>
		<a class="btn btn-secondary" th:href="@{/dashboard}">Dashboard</a>
	</div>
	<div class="row g-3">
		<div class="col-md-4">
			<div class="card">
				<div class="card-header">Them tai khoan</div>
				<div class="card-body">
					<form th:action="@{/account}" method="post">
						<input class="form-control mb-2" name="name" placeholder="Ten tai khoan" required>
						<select class="form-select mb-2" name="type">
							<option value="cash">Tien mat</option>
							<option value="bank">Ngan hang</option>
							<option value="ewallet">Vi dien tu</option>
							<option value="other">Khac</option>
						</select>
						<input class="form-control mb-2" name="balance" type="number" step="0.01" placeholder="So du" required>
						<input class="form-control mb-3" name="description" placeholder="Mo ta">
						<button class="btn btn-primary w-100">Them</button>
					</form>
				</div>
			</div>
		</div>
		<div class="col-md-8">
			<div class="card">
				<table class="table table-striped mb-0">
					<thead><tr><th>Ten</th><th>Loai</th><th class="text-end">So du</th><th></th></tr></thead>
					<tbody>
					<tr th:each="a : ${accounts}">
						<td th:text="${a.name}"></td>
						<td th:text="${a.type}"></td>
						<td class="text-end" th:text="${#numbers.formatDecimal(a.balance, 0, 'COMMA', 0, 'POINT')}"></td>
						<td class="text-end"><a class="btn btn-sm btn-outline-danger" th:href="@{/account(action='delete',id=${a.id})}">Xoa</a></td>
					</tr>
					<tr th:if="${#lists.isEmpty(accounts)}"><td colspan="4" class="text-center text-muted">Chua co tai khoan</td></tr>
					</tbody>
				</table>
			</div>
		</div>
	</div>
</main>
</body>
</html>
