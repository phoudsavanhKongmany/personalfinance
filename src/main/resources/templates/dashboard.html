<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Dashboard</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark">
	<div class="container-fluid">
		<a class="navbar-brand" th:href="@{/dashboard}">Personal Finance</a>
		<div class="d-flex gap-2">
			<a class="btn btn-outline-light btn-sm" th:href="@{/transactions}">Giao dich</a>
			<a class="btn btn-outline-light btn-sm" th:href="@{/account}">Tai khoan</a>
			<a class="btn btn-outline-light btn-sm" th:href="@{/category}">Danh muc</a>
			<a class="btn btn-outline-light btn-sm" th:href="@{/debt}">No</a>
			<a class="btn btn-outline-light btn-sm" th:href="@{/investment}">Dau tu</a>
			<a class="btn btn-outline-light btn-sm" th:href="@{/setting}">Cai dat</a>
			<a class="btn btn-danger btn-sm" th:href="@{/auth(action='logout')}">Dang xuat</a>
		</div>
	</div>
</nav>
<main class="container py-4">
	<div class="d-flex justify-content-between align-items-center mb-4">
		<div>
			<h3 class="mb-1">Tong quan tai chinh</h3>
			<p class="text-muted mb-0" th:text="'Xin chao, ' + ${session.loggedUser.fullName}"></p>
		</div>
		<form class="d-flex gap-2" method="get" th:action="@{/dashboard}">
			<input class="form-control" type="number" name="month" min="1" max="12" th:value="${month}">
			<input class="form-control" type="number" name="year" th:value="${year}">
			<button class="btn btn-primary">Xem</button>
		</form>
	</div>
	<div class="row g-3 mb-4">
		<div class="col-md-4">
			<div class="card border-success">
				<div class="card-body">
					<div class="text-muted">Thu nhap</div>
					<h4 th:text="${#numbers.formatDecimal(summary.income ?: 0, 0, 'COMMA', 0, 'POINT')} + ' VND'"></h4>
				</div>
			</div>
		</div>
		<div class="col-md-4">
			<div class="card border-danger">
				<div class="card-body">
					<div class="text-muted">Chi tieu</div>
					<h4 th:text="${#numbers.formatDecimal(summary.expense ?: 0, 0, 'COMMA', 0, 'POINT')} + ' VND'"></h4>
				</div>
			</div>
		</div>
		<div class="col-md-4">
			<div class="card border-primary">
				<div class="card-body">
					<div class="text-muted">Giao dich moi</div>
					<a class="btn btn-primary btn-sm mt-2" th:href="@{/transactions/new}">Them giao dich</a>
				</div>
			</div>
		</div>
	</div>
	<div class="card">
		<div class="card-header">Giao dich gan day</div>
		<div class="table-responsive">
			<table class="table table-striped mb-0">
				<thead><tr><th>Ngay</th><th>Danh muc</th><th>Loai</th><th class="text-end">So tien</th></tr></thead>
				<tbody>
				<tr th:each="t : ${recentTransactions}">
					<td th:text="${t.transactionDate}"></td>
					<td th:text="${t.categoryName}"></td>
					<td th:text="${t.type}"></td>
					<td class="text-end" th:text="${#numbers.formatDecimal(t.amount, 0, 'COMMA', 0, 'POINT')}"></td>
				</tr>
				<tr th:if="${#lists.isEmpty(recentTransactions)}"><td colspan="4" class="text-center text-muted">Chua co du lieu</td></tr>
				</tbody>
			</table>
		</div>
	</div>
</main>
</body>
</html>
