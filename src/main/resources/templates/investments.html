<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Dau tu</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-4">
	<div class="d-flex justify-content-between mb-3">
		<h3>Dau tu</h3>
		<a class="btn btn-secondary" th:href="@{/dashboard}">Dashboard</a>
	</div>
	<div class="row g-3">
		<div class="col-md-4">
			<div class="card">
				<div class="card-header">Them dau tu</div>
				<div class="card-body">
					<form th:action="@{/investment}" method="post">
						<input class="form-control mb-2" name="name" placeholder="Ten khoan dau tu" required>
						<select class="form-select mb-2" name="type">
							<option value="stock">Co phieu</option>
							<option value="saving">Tiet kiem</option>
							<option value="fund">Quy</option>
							<option value="other">Khac</option>
						</select>
						<input class="form-control mb-2" name="investedAmount" type="number" step="0.01" placeholder="Von dau tu" required>
						<input class="form-control mb-2" name="currentValue" type="number" step="0.01" placeholder="Gia tri hien tai" required>
						<input class="form-control mb-2" name="startDate" type="date">
						<input class="form-control mb-3" name="note" placeholder="Ghi chu">
						<button class="btn btn-primary w-100">Them</button>
					</form>
				</div>
			</div>
		</div>
		<div class="col-md-8">
			<div class="card">
				<table class="table table-striped mb-0">
					<thead><tr><th>Ten</th><th>Loai</th><th class="text-end">Von</th><th class="text-end">Hien tai</th><th class="text-end">Lai/lo</th><th></th></tr></thead>
					<tbody>
					<tr th:each="i : ${investments}">
						<td th:text="${i.name}"></td>
						<td th:text="${i.type}"></td>
						<td class="text-end" th:text="${#numbers.formatDecimal(i.investedAmount, 0, 'COMMA', 0, 'POINT')}"></td>
						<td class="text-end" th:text="${#numbers.formatDecimal(i.currentValue, 0, 'COMMA', 0, 'POINT')}"></td>
						<td class="text-end" th:text="${#numbers.formatDecimal(i.profit, 0, 'COMMA', 0, 'POINT')}"></td>
						<td class="text-end"><a class="btn btn-sm btn-outline-danger" th:href="@{/investment(action='delete',id=${i.id})}">Xoa</a></td>
					</tr>
					<tr th:if="${#lists.isEmpty(investments)}"><td colspan="6" class="text-center text-muted">Chua co dau tu</td></tr>
					</tbody>
				</table>
			</div>
		</div>
	</div>
</main>
</body>
</html>
