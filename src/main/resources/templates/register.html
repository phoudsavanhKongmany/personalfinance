<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Dang ky</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-5" style="max-width:460px">
	<div class="card shadow-sm">
		<div class="card-header bg-success text-white text-center">
			<h4 class="mb-0">Dang ky tai khoan</h4>
		</div>
		<div class="card-body">
			<div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
			<form th:action="@{/auth}" method="post">
				<input type="hidden" name="action" value="register">
				<div class="mb-3">
					<label class="form-label">Ho ten</label>
					<input class="form-control" name="fullName" required>
				</div>
				<div class="mb-3">
					<label class="form-label">Ten dang nhap</label>
					<input class="form-control" name="username" required>
				</div>
				<div class="mb-3">
					<label class="form-label">Mat khau</label>
					<input class="form-control" type="password" name="password" required>
				</div>
				<button class="btn btn-success w-100" type="submit">Dang ky</button>
			</form>
			<div class="text-center mt-3">
				<a th:href="@{/login}">Dang nhap ngay</a>
			</div>
		</div>
	</div>
</main>
</body>
</html>
