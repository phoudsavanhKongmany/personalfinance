<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>No</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-4">
	<div class="d-flex justify-content-between mb-3">
		<h3>Khoan no</h3>
		<a class="btn btn-secondary" th:href="@{/dashboard}">Dashboard</a>
	</div>
	<div class="row g-3">
		<div class="col-md-4">
			<div class="card">
				<div class="card-header">Them khoan no</div>
				<div class="card-body">
					<form th:action="@{/debt}" method="post">
						<input class="form-control mb-2" name="name" placeholder="Ten khoan no" required>
						<select class="form-select mb-2" name="type">
							<option value="borrow">Toi vay</option>
							<option value="lend">Cho vay</option>
						</select>
						<input class="form-control mb-2" name="amount" type="number" step="0.01" placeholder="So tien" required>
						<input class="form-control mb-2" name="person" placeholder="Nguoi lien quan">
						<input class="form-control mb-2" name="dueDate" type="date">
						<input class="form-control mb-3" name="note" placeholder="Ghi chu">
						<button class="btn btn-primary w-100">Them</button>
					</form>
				</div>
			</div>
		</div>
		<div class="col-md-8">
			<div class="card">
				<table class="table table-striped mb-0">
					<thead><tr><th>Ten</th><th>Loai</th><th>Nguoi</th><th>Han</th><th class="text-end">Con lai</th><th></th></tr></thead>
					<tbody>
					<tr th:each="d : ${debts}">
						<td th:text="${d.name}"></td>
						<td th:text="${d.type}"></td>
						<td th:text="${d.person}"></td>
						<td th:text="${d.dueDate}"></td>
						<td class="text-end" th:text="${#numbers.formatDecimal(d.remaining ?: d.amount, 0, 'COMMA', 0, 'POINT')}"></td>
						<td class="text-end">
							<a class="btn btn-sm btn-outline-success" th:if="${d.status != 'done'}" th:href="@{/debt(action='done',id=${d.id})}">Xong</a>
							<a class="btn btn-sm btn-outline-danger" th:href="@{/debt(action='delete',id=${d.id})}">Xoa</a>
						</td>
					</tr>
					<tr th:if="${#lists.isEmpty(debts)}"><td colspan="6" class="text-center text-muted">Chua co khoan no</td></tr>
					</tbody>
				</table>
			</div>
		</div>
	</div>
</main>
</body>
</html>
