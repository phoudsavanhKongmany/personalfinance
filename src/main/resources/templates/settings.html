<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Cai dat</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-4" style="max-width:760px">
	<div class="d-flex justify-content-between mb-3">
		<h3>Cai dat</h3>
		<a class="btn btn-secondary" th:href="@{/dashboard}">Dashboard</a>
	</div>
	<div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
	<div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
	<div class="row g-3">
		<div class="col-md-6">
			<div class="card">
				<div class="card-header">Ho so</div>
				<div class="card-body">
					<form th:action="@{/setting}" method="post">
						<input type="hidden" name="action" value="updateProfile">
						<label class="form-label">Ten dang nhap</label>
						<input class="form-control mb-2" th:value="${session.loggedUser.username}" disabled>
						<label class="form-label">Ho ten</label>
						<input class="form-control mb-3" name="fullName" th:value="${session.loggedUser.fullName}" required>
						<button class="btn btn-primary">Cap nhat</button>
					</form>
				</div>
			</div>
		</div>
		<div class="col-md-6">
			<div class="card">
				<div class="card-header">Doi mat khau</div>
				<div class="card-body">
					<form th:action="@{/setting}" method="post">
						<input type="hidden" name="action" value="changePassword">
						<input class="form-control mb-2" type="password" name="oldPassword" placeholder="Mat khau cu" required>
						<input class="form-control mb-2" type="password" name="newPassword" placeholder="Mat khau moi" required>
						<input class="form-control mb-3" type="password" name="confirmPassword" placeholder="Nhap lai mat khau moi" required>
						<button class="btn btn-warning">Doi mat khau</button>
					</form>
				</div>
			</div>
		</div>
	</div>
</main>
</body>
</html>
